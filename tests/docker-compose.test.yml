services:
  immich-server:
    container_name: immich-test-server
    image: ghcr.io/immich-app/immich-server:release
    environment:
      DB_HOSTNAME: database
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE_NAME: immich
      REDIS_HOSTNAME: redis
      IMMICH_MACHINE_LEARNING_ENABLED: "false"
      IMMICH_ENV: testing
      IMMICH_PORT: "3001"
      IMMICH_IGNORE_MOUNT_CHECK_ERRORS: "true"
    volumes:
      - upload-test:/usr/src/app/upload
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "2285:3001"

  redis:
    container_name: immich-test-redis
    image: redis:6.2-alpine

  database:
    container_name: immich-test-postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.3.0
    command: -c fsync=off -c shared_preload_libraries=vchord.so
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: immich
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d immich"]
      interval: 1s
      timeout: 5s
      retries: 30

volumes:
  upload-test:
